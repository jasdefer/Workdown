# Steps spliced into every per-target build job by cargo-dist
# (via `github-build-setup` in `dist-workspace.toml`). Runs before
# `cargo build` so `ui/dist/` is populated and rust-embed can bake it
# into the release binary.
#
# The UI build goes through `cargo xtask build-ui` — the single source
# of truth for how the bundle is built (gen-types + npm ci + check +
# build), shared with ci.yml. Rust is already installed by this point in
# the release job, so `cargo` is on PATH; Node still needs setting up
# because xtask shells out to `npm`.
- name: Set up Node
  uses: actions/setup-node@v4
  with:
    node-version: '20'
    cache: 'npm'
    cache-dependency-path: ui/package-lock.json
- name: Build UI bundle
  run: cargo xtask build-ui
