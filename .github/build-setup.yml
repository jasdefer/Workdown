# Steps spliced into every per-target build job by cargo-dist
# (via `github-build-setup` in `dist-workspace.toml`). Runs before
# `cargo build` so `ui/dist/` is populated and rust-embed can bake it
# into the release binary.
#
# Note: cargo-dist's template does not pass through `working-directory`,
# so we use `cd ui && ...` instead.
- name: Set up Node
  uses: actions/setup-node@v4
  with:
    node-version: '20'
    cache: 'npm'
    cache-dependency-path: ui/package-lock.json
- name: Install UI deps
  run: cd ui && npm ci
- name: Build UI bundle
  run: cd ui && npm run build
