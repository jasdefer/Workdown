name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      # Build the UI bundle before any Rust step: the non-test
      # `UiAssets` rust-embed derive requires `ui/dist/` to exist at
      # compile time, so clippy/build/doc would fail without it.
      - name: Build UI bundle
        run: cargo xtask build-ui

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Doc
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings

      # UI bundle is already built above; just exercise the release
      # compile so we catch `--release`-only breakage.
      - name: Release build
        run: cargo build --release --workspace

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
