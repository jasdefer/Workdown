# Default Workdown Views — copied into your project by `workdown init`.
# Each entry is a persisted view rendered by `workdown render`.
# Customize `field` values to fit your schema.

views:
  - id: status-board
    type: board
    field: status

  - id: hierarchy
    type: tree
    field: parent

  - id: dependencies
    type: graph
    field: depends_on
    group_by: parent
    title: title

  - id: items
    type: table
    columns: [id, type, status, parent, depends_on]

  - id: roadmap
    type: gantt
    start: start_date
    end: end_date
    group: type
    title: title
    where:
      - "type=milestone,epic"

  - id: roadmap-by-duration
    type: gantt
    start: start_date
    duration: duration
    group: type
    title: title
    where:
      - "type=milestone,epic"

  - id: roadmap-by-predecessor
    type: gantt
    start: start_date
    duration: duration
    after: depends_on
    group: type
    title: title
    where:
      - "type=milestone,epic"

  - id: roadmap-by-initiative
    type: gantt_by_initiative
    start: start_date
    end: end_date
    root_link: parent
    title: title
    where:
      - "type=milestone,epic"

  - id: roadmap-by-depth
    type: gantt_by_depth
    start: start_date
    end: end_date
    depth_link: parent
    title: title
    where:
      - "type=milestone,epic"

  - id: project-stats
    type: metric
    where:
      - "status!=removed"
    metrics:
      - label: Total items
        aggregate: count
      - label: To do
        aggregate: count
        where: ["status=to_do"]
      - label: In progress
        aggregate: count
        where: ["status=in_progress"]
      - label: Done
        aggregate: count
        where: ["status=done"]
      - label: Sum of scheduled duration
        aggregate: sum
        value: duration
      - label: Earliest start
        aggregate: min
        value: start_date
      - label: Latest end
        aggregate: max
        value: end_date
