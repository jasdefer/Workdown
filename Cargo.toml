[package]
name = "workdown"
version = "0.1.0"
edition = "2021"
description = "Git-based project management — work items as Markdown files"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "wrap_help", "env"] }
indexmap = { version = "2", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = "1"
walkdir = "2"
console = "0.15"
comfy-table = "7"
csv = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
strip = true
lto = true
