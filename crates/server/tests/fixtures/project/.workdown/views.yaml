views:
  - id: status-board
    type: board
    field: status

  - id: hierarchy
    type: tree
    field: parent
    title: title
    columns: [status]

  - id: items-table
    type: table
    title: title
    columns: [id, title, status, parent]

  - id: project-stats
    type: metric
    metrics:
      - label: Total items
        aggregate: count
      - label: Open
        aggregate: count
        where: ["status=open"]
      - label: In progress
        aggregate: count
        where: ["status=in_progress"]
      - label: Done
        aggregate: count
        where: ["status=done"]

  - id: items-by-status
    type: bar_chart
    group_by: status
    aggregate: count
