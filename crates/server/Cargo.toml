[package]
name = "workdown-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Workdown HTTP server"
publish = false

[dependencies]
workdown-core = { path = "../core" }
anyhow = "1"
axum = "0.8"
mime_guess = "2"
# debug-embed feature is OFF by default — debug builds read ui/dist/ from
# disk at runtime, release builds bake it in. Keeps `cargo check` / `cargo
# test` fast and pure-Rust during dev.
rust-embed = "8"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "signal"] }
tower = "0.5"
tracing = "0.1"
